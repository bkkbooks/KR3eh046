body:
  text: 卷上汲嘗考諸經腳氣之疾其來久矣在黃帝時名為厥兩漢之間多為緩風宋齊之後謂為腳弱至於大唐始名腳氣其號雖殊其實一也厥病之由雖皆凝風毒濕氣中於肝腎脾經其脈起於足十指且風毒之氣出於地寒暑風濕皆作蒸氣足常履之故內傳經絡因成腫痛攣弱乃名腳氣然感疾之由若在夏月久坐立於濕地則濕熱之氣蒸入經絡病則發熱四肢疼悶若在冬月久坐立於濕地則冷濕之氣上入經絡病則轉筋百體酷冷若當風取涼得之病則皮內頑痹諸處蠕動漸漸向頭面此三者尤宜辨之但後學不能深察即妄為治療輕者變重重者難治可不慎哉其既得之後或虛或實或冷或熱皆由素稟故腳氣之候有輕有重有干有濕有陰有陽有實有虛乾者風毒在絡膝腿致或瘦或痛或攣或緩弱不遂喘渴頭痛大小便閉或頑痹不仁濕者濕毒在經腿腫皮肉紫白裂破作瘡內自膿壞大便或泄或祕或為便癰煩躁不欲飲食陰者風毒在臟惡明好靜即身冷足厥筋攣或小腹不仁陽者風毒在腑病發即身脛熱筋脈抽痛為緩縱不收寒熱頭痛喜嗔叫好明處氣促精神昏憒者因常服補暖藥壅祕而生故為寒熱喘滿喜妄誤語壯熱頭痛虛者嗜欲無節榮衛空虛骨髓枯竭復不餌補藥身體酷冷兩脛痠痛膝冷轉筋不能行動喘促此其候之不同也若論其脈則唐蘇恭嘗謂有三脈緩為輕沉為次洪數為下大概沉緊者為難治洪數者易治緩者不療自瘥若療之違法雖輕亦重療之得理雖重亦輕大抵脈順四時者生違四時者難治蓋脈沉緊為邪入里傷痹也故重沉洪數者陽有餘與風厥相應故易治緩者邪氣微故自瘥又孫思邈之論亦云脈有三品內外證候相似但脈有異若脈浮大而緩宜服續命湯若素風盛以越婢湯若脈浮而緊轉駛而作竹瀝湯若脈微而弱宜風引湯此脈多是陰虛而得之若大虛短氣宜間作補湯隨病冷熱而用之然古人治此有門大率風多而濕少即服風引續命越婢之類濕多而風少即宜獨活寄生湯薏苡湯之類若一概用藥則難奇效全當消息之至如江淮嶺南秦川四時氣候隨異如此人久在江淮及嶺南宦客風毒在臟腑或歸秦中腳氣發動亦依江淮嶺南法為治蓋秦川地原高亢春夏縱經霖霪少有蒸濕所以禾黍五穀受氣不同水菜魚肉食飲全異其地卑濕者則蒸熱相仍利於燥藥土地高亢者側時宜汗利又如諸方腳氣本以腎虛或者用藥補益十未有全其一二者蓋雖由腎虛因感風濕故邪氣益盛盛則雖虛而實反將峻補故壅氣生喘滿千金云腹脹非瀉不愈者正謂是也又素問腳氣之人只壯以秋冬良由陽內而陰外無蒸疾之氣故有風毒之人須準四時服食即無發動故春夏宜汗利秋冬乘疾小歇宜以諸藥小滋補之則氣平而不作今之醫者只以家傳之學不能深究其理但一向補益或只疏下蓋不得中道也若在冬月須當隨人盛衰微有滋補若不然則致使血氣日衰必使年年遇蒸熱而作此理之然也昔人有云腳氣有腎虛而生或者以婦人不主於腎便謂無此疾者非也蓋婦人雖不專主於腎而必因血海虛乘宿塊嗔恚感激悲傷遂成此疾兼今婦人病此者甚衆則知婦人以血海虛而得之與男子腎虛類矣凡治婦人之法與男子用藥故無有異但兼以治憂恚藥無不效也汲昔熙寧年因行大雪中為寒濕冷氣相乘遂成茲疾十年之間凡七八發動每發至劇而證候差異一旬之內變候不等因深思其源博求古方採摘要法纍試神方不敢私隱傳而録之腳氣發動大抵雖同然三分論之一分有異當依法循證治之乃瘥其同者手足厥緩弱頑痹不仁腫痛或瘡小愈之後仍宜依四季法服食無不效者若夫痿厥不能動者比此為微但只以諸腳氣法治之指期可效謹依四時之宜方藥之法其名録之於後論曰古之太醫往往因自病或親屬有疾故究心積慮遂為高醫良由日見變候斟酌冷熱虛實悉所經歷則唐孫真人甄權蘇恭深師道人之類皆其人也諺曰千聞不如一見此之謂也今具實經病腳氣人已嘗試用得效方別為一門所貴臨時有可依據也論曰人有久蓄積氣因感風毒成疾之後或一向補益不經汗利即使風毒成實因致祕積壯熱喘滿腳腫赤痛大小便祕喜妄誤語者是其候也宜紫氣紅雪防風湯神功丸角犀飲如小便澀即服絳宮丸白皮小豆散治之論曰陽氣衰於下則為寒厥其人足脛寒筋攣急脛酸膝冷痛或頑痹不仁惡明好靜此其候也宜以石南丸金牙酒側子酒八味丸海桐皮散木香飲子松節散及灸風市穴即愈論曰人有稟賦氣虛及興居不節或謂腳氣不可滋補冬月略不小補但服疏瀉藥過度使臟虛而兩腳削身體酷冷少力膝冷轉筋攣緊而重者是其候也宜風引湯八味木瓜丸石南丸金牙酒側子酒及灸絶骨穴於冬時服之即免毒氣入腹疾不作也論曰凡針灸孔穴主對者穴名在上病狀在下其腳氣一病最宜針灸灸而不針者非也針灸而不藥尤非也腳氣初得便速針灸若專以藥不針灸則可半差矣然尺寸之法人有長短膚有肥瘦皆須精思準折之不得一概致有差失尺寸之準以銅人隨中指中紋為是若坐點穴者坐灸之臥點穴者臥灸之立點穴者立灸之不依此者徒破肉耳蘇恭有云腳氣始發通隨痛處灸不必依穴者亦如素問繆刺之法亦可依用初灸風市主兩膝攣痛引脅拘急軃躄或青或黃枯黧如腐木緩縱痿痹次灸伏兔主中寒按甲乙經云足陽明經刺可五分不可過也次灸犢鼻主膝中痛不仁難跪此穴腫不可灸亦不可刺次灸膝兩眼主膝冷痹痛次灸三里穴主腰疼不能久立膝痿腹脹滿內廉痛足痿失履不收次灸上廉穴主小便難赤黃狂言非常次灸下廉穴主小便難赤黃次灸絶骨穴主風勞身腫髀樞痛膝骨酸血痹不仁筋縮諸節酸折四肢懈惰不收風勞身重論曰風濕毒氣中於足脛遂為腳氣若久而不治或治之一向用疏下藥臟氣虛弱毒勢內攻入腹悶亂煩喘氣不得息若下不速以湊毒之藥必致惡氣內熏五臟使三焦榮衛不通則治療為難譬由浸淫瘡從四指流向心腹者不治從腹流向四肢者易治此瘡毒不由經絡外自皮膚者尚爾又況風毒因經絡受邪而內達五臟者歟如此勢極內攻入腹者無出木瓜茱萸湯最救困急服餌之後雖使惡毒邪濕盛來無由入矣論曰凡腳氣治法大抵每日須進食前丸食後丸在春夏當服防風續命越婢竹瀝風緩八風獨活寄生海桐皮等湯若大便祕則服神功丸麻仁丸三脘散三仁丸橘香丸潤腸丸若小便不通即服白皮小豆散絳宮丸木通散尤宜針石之類取證最親者服之秋冬腳氣正是小歇當服金牙側子酒腎瀝湯石南丸八味丸木瓜丸牛膝丸及灸亦取證親者用之四時之中皆宜淋煠蒸尉寅日去手甲理髮丑日濯足去腳甲令深取大去風氣故也有力之人當作天門冬大煎四時不闕服之此最腳氣之要方但難得藥材爾病者宜知此方天門冬大煎治男子五勞七傷八風十三痹傷中六極一氣極則多寒痹腹痛喘息驚恐頭痛二肺極則寒痹腰痛心下堅有積聚小便不利手足不仁三脈極則顏色苦青逆噫嘻恍惚失氣狀似悲泣之後舌強咽喉干寒熱惡風不可動不嗜食苦眩喜怒妄言四筋極則拘攣少腹堅脹心痛膝寒冷四肢骨節皆疼痛五骨極則肢節厥逆黃疸消渴癰疽妄發重病浮腫如水病狀六肉極則發疰如鬼擊不復言甚者至死復生衆醫所不治此皆六極七傷所致非獨房室之為也憂恚積思喜怒悲歡復隨風濕結氣咳時嘔吐食物為變大小便不利時泄利重下溺血氣上吐下乍寒乍熱臥不安席小便赤黃時時惡夢與死人共食飲入家神室魂飛魄散筋極則傷肝傷肝則腰背相引難作俯仰氣極則傷肺傷肺則小便有血目不明髓極則陰痿不起住而不交骨極則傷腎傷腎則短氣不可久立陰疼惡寒甚者卵縮陰下生瘡濕癢瘙之不欲住汗出神昏為腎病甚者多遭風毒四肢頑痹手足浮腫名曰腳弱腎所不治此悉主之熙寧年間有濟南崔公即中直先自川中病風得安時其子生須城簿迎侍於此經夏涉履蒸濕腳為之腫弱攣痛於沂州取得螣骨汁川中得真酥遂合成半劑服之即應細詳此方通四時括衆虛實寒熱率皆主對乃知孫真人之用心處療有如此者世之人或有藥品繁多求索難得遂於受疾而憚於修治良可嘆也論曰風陽物也性上騰腳氣厥之人氣多上行不順薄而生熱內枯津液遂為祕滯如肥澤壯實熱風盛者當以神功丸麻仁丸大黃湯之類如老人津液少及素虛遇祕者當服三仁丸五柔丸潤腸丸橘皮丸三脘散之類此二候不同切宜斟酌而用也論曰足經受卑濕之氣及膀胱宿有停水甚者攻注腫破皮肉頑紫世所謂下注腎風者乃其候也亦有成瘡但腫痛痹弱者宜獨活寄生湯薏苡湯其已攻注者宜茴香丸天麻丸烏蛇丸及陳元膏摩之論曰凡腳氣人足經留滯淋煠蒸尉最為要然當先煎煮成諸湯欲淋煠時自膝下至踝以故衣裹數重隨將溫湯徐徐沃湯在膝下慎不可先煠兩足須自膝煠至足蓋風氣從足甲出若先煠足即風毒上行入腹切宜慎之煠訖後去足甲為良當用丑日或十二日一去之論曰夫人法天地之形稟陰陽而生四時寒暑推移人氣不定腳氣發動必由天之五氣地之五行治之雖其間變易小有不同而大法不過如此故謹序月令條法於其下凡正月二月天氣正方地氣始發人氣在肝宜導和氣加厚襪以暖足宜進地黃粥補虛防風粥以去四肢風紫蘇粥以去壅氣及桑皮煎竹瀝防風風引續命風緩越婢獨活海桐皮八風等湯以除風及宜淋煠蒸煨足膝以利關節導引按蹺以舒壅滯針石以開發邪氣三月四月天氣正方地氣正定發人氣在脾宜食薤以散結氣利病人又取楝花和粉粉身以固陽氣除邪亦宜前治風藥以除邪氣大抵春三月天地俱生萬物以榮夜臥早起廣步於庭被髮緩形以便志生生而勿殺豫而弗奪賞而勿罰此春氣之應養生之道也及宜進溫食尤宜丸煎以除風熱之疾五月六月天氣正盛地氣高人氣在頭宜服獨活寄生湯以湊風濕氣宜木瓜漿以解渴利腰腳大抵夏三月此謂蕃秀天地氣交萬物華實早臥早起無厭於日使智無怒使華英成秀使氣得泄此夏氣之應養長之道也七月八月陰氣始殺人氣在肺宜溫下頻易襪履以防濕氣宜獨活寄生湯海桐皮散薏苡湯以溫下除濕毒之氣大抵秋三月此謂容平無外其志使肺氣清此秋氣之應養成之道也九月十月陰氣始冰地氣閉人氣在心腳氣正是小歇當飲金牙側子酒腎瀝湯牛膝石南木瓜八味等丸小小補之不可導引按蹺十一月十二月冰凍地氣合人氣在腎宜前諸補藥以益元真及諸灸腰腎禦寒邪氣也亦不宜導引動氣大抵冬三月此謂閉藏水冰地圻無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫使氣涵養此冬氣之應養臟之道也治驗嘉祐二年正月二十六日殿直郭中立來求孫殿丞兆診脈久患腳氣疼痛身發寒熱脹滿氣上服熱藥即甚兆與九味延年茯苓飲子以下其氣每用六物麻仁丸以泄其熱後又上氣嘔逆煩熱遂令服局方紫雪大效延年茯苓飲麻仁丸方見本門熙寧年間崔郎中直病腳氣腫弱枯瘦不能行汲作千金方天門冬大煎服之即瘥永不發方見後董文思中行為汶上駐泊日忽覺兩腳赤腫疼足下隱痛汲與食前丸食後丸即瘥即冬月令作金牙酒並淋煠遂不復作梁承議子諒病膝痛不能跪翰林醫官楊文蔚處海桐皮散服之遂愈吳宣義琯在汶上病腳氣中滿宣義郎席公延賞處順氣丸麻仁丸神仙丸遂愈馮侍郎宅十五小娘子病腳弱不能步翰林尚藥奉御孔元處千金方獨活寄生湯遂愈汲熙寧年間因冬月行大雪中至春雨腳忽然赤腫疼痛痿弱不能行走遂服犀角飲及韶腦湯蜀椒湯淋煠得瘥經月再作自腳及通身腫氣漸上入腹心煩腹滿氣促面如土色大小便不通遂以檳榔一枚為末訶子炮去核取末一錢生牽牛取末二錢以童子小便二盞生薑一錢切煎一沸去薑調前藥末分二服小便大利腫遂消盡後兩腳作瘡久久不愈以天麻丸烏蛇丸摩以陳元膏瘡遂愈但覺腳弱無力冬月進以木瓜丸食前丸金牙酒腳遂有力
