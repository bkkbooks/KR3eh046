body:
  text: 原序昔孫思邈著書至其敘百病必先中風敘中風必先入腳氣豈無意哉蓋以為風者百病之長而卑濕蒸郁之氣中人也尤重則聖人為治先後之次明示後人後學者俞當致詳且慎焉然中風方論古人立説尤詳至於四方之治食藥之宜無不備悉而腳氣一門雖古今概舉其略而治法論方多有未備故人罕窮究是疾至於江淮卑濕之地相去遼遠人或有所不識故疾雖重於中風而患頗稀是以古人為説不詳而未學治療亦多致失誤可不痛哉恭自本朝開攘最遠一統天下屬以承平日久故食物無南北之異道途無久遠之期或因宦遊或自客泛故內地感此者近日為多汲自少小病此約十餘年遂博採素問九靈靈樞甲乙太素巢元千金外臺聖惠小品刪繁金匱玉函諸家本草及蘇恭方論前古脈書凡古有是説者無不究極而臟腑之論針艾之法脈證之辨飲食之宜四時之要導引之術以至淋煠蒸尉備急要方或經試驗者悉録而集之名曰腳氣治法總要分為一十九門通為一卷非敢自謂有補於將來亦欲傳諸好事者庶幾臨病有所證採焉董汲序
