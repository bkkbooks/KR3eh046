body:
  text: 卷下獨活寄生湯治腰背痛夫腰背痛者皆由腎氣虛弱臥冷濕地當風所得不為速治氣流入腳膝為偏枯冷痹緩弱疼重或腰脅痛腳氣攣重宜急服此湯獨活三兩一本作二兩桑上寄生如無以續斷代之杜仲銼炒令絲斷牛膝酒浸細辛秦艽白茯苓去皮桂去皮防風川芎人參甘草炙當歸白芍藥熟乾地黃各二兩上為散每服三錢水一大盞煎至六分去滓溫日二服訖溫身勿令冷也氣虛下利者除乾地黃服湯取蒴藋葉火燎厚安席上及熱脫上冷復燎之冬月取根春取莖熬臥之佳其餘薄尉不及蒴藋蒸也諸處風濕亦用此法婦人新産竟便患腹痛不得轉動及腰腳痛攣不得屈伸痹弱者尤宜服之除風消血也薏苡湯治風濕毒氣攻兩腳痛重或即浮腫或皮焦毛悴肉色紫破筋骨抽痛心悶氣脹頭旋多睡眼暗薏苡仁微炒八兩白茯苓去皮五分防風五分牛膝酒浸桂去皮五加皮各六分獨活五分玄參五兩石膏五兩枳殼四兩麵炒去瓤升麻六兩羚羊角四兩漢防己十兩麻黃去節五兩上為粗散每服三錢水一盞半先浸一宿平旦煎至八分去滓溫服不以時月絳官丸治心經熱小便淋澀不通及諸淋生地黃四兩木通黃芩各二兩上為細末煉蜜為丸如梧桐子大服三十丸溫水下白皮小豆散治腳氣小便澀兩腳腫氣脹赤小豆半升桑白皮二兩銼紫蘇一握銼生薑半兩上水三升煎至豆熟取豆食去滓余汁飲之紅雪治腳氣氣毒身內外煩熱瘡腫狂叫及諸丹石毒瘴癘時行一切風熱方升麻三兩大青三兩桑白皮二兩犀角屑一兩半羚羊角一兩訶子三十枚去核檳榔三十枚蘇木六兩山梔子三十個槐花末一兩淡竹葉四兩上並銼細以水二斗浸經宿煎取一斗下上好朴硝十斤又煎以柳篦子攪於新瓦盆中貯又經宿去余煎不盡水即成紅雪神功丸疏解諸祕滯及交氣下流腰腳疼腫脹滿大黃三兩人參半兩訶子泡去核二兩麻仁別研五兩上杵研為細末煉蜜為丸如梧桐子大每服三十丸溫水下不以時以通為度未通更加丸數老少氣以意加減石南丸治腎氣虛客風濕陰腳氣筋急拘攣濕痹緩弱下氣除筋骨間邪氣濕不仁寒厥痿痹腰脊腳痛膝冷轉筋腳腿緊不能久立及如履物隱痛石南葉炙去毛桂去皮附子炮防風去蘆各六兩牛膝酒浸白茯苓去皮各八兩熟地黃菟絲子酒浸各二兩薏苡仁六兩五加皮六兩上為細末用木瓜一枚去皮子蒸熟研成膏和前藥末為劑如干硬入少熱蜜和劑為丸如梧桐子大空心木瓜酒下三十丸日二金牙酒治瘴癘毒氣中人風冷濕痹口喎面戾半身不遂手足拘攣歷節腫痛甚者少腹不仁名曰腳氣無所不治金牙石一斤蓯蓉去鱗酒浸白茯苓去皮側子炮去皮附子炮去皮臍天雄炮去皮當歸人參防風黃耆薯蕷細辛桂去皮萆薢威蕤白芷桔梗黃芩遠志去心蔓荊子川芎地骨皮五加皮杜仲炒銼厚朴炙枳實麩炒去瓤白朮各三兩獨活半斤茵陳石南微炒狗脊去毛各二兩牛膝丹參各五兩磁石十兩薏苡仁麥門冬去心各十兩石斛八兩去根蒴藋四兩生地黃切二升上三十九味銼以酒八斗漬七日溫服一合日四五一合藥細研別絹袋盛共藥同漬藥力和善主治極多凡是風虛四體下覺有風痾者皆順時服一依方合之不得輒信人大言浪有加減八味丸治虛損不足大渴飲水腰脊痛小腹拘急小便不利及腳氣上少腹不仁熟地黃八兩山茱萸薯蕷各四兩澤瀉牡丹皮白茯苓去皮各三兩桂去皮附子各二兩上為末煉蜜為丸如梧桐子大酒下三十丸張仲景云久服去附子加五味子海桐皮散治風濕兩腿腫滿疼重及一切風順凝滯氣陰百節拘攣痛海桐皮一兩羚羊角屑薏苡仁各二兩防風羌活筒桂去皮赤茯苓去皮熟乾地黃各一兩檳榔一兩上為散每服三錢水一盞生薑五斤同煎至七分去滓溫服木香飲子治陰腳氣冷積於臟脹悶衛心嘔逆木香八分吳茱萸桔梗各六分大腹子五個大黃四分厚朴八分薑汁浸炙上為粗散每服三錢水一大盞入生薑三片同煎至七分去滓溫服如人行十里再服良久氣通乃瘥松節散治腳氣冷搏於筋轉筋攣痛松節取茯神中根心子用一兩銼如米乳香一錢捶碑上用銀石器中炒令焦只留一二分性出火毒研細每服一錢至二錢熱木瓜酒調下應是病治之木瓜丸治風濕腳氣兩足緩弱轉筋疼痛久服步履如飛木瓜大者一枚破為兩段去瓤子入通明乳香一兩研青鹽二錢研甘菊花頭子研為末二兩上除菊末外都入木瓜內以線系入飯甑內蒸候木瓜爛為度取出研成膏入菊末即丸如梧桐子大每日空心酒下三十丸鹽湯亦可服百日欲出汗身亦自香如未能幹更入甘菊末直候可丸即丸木瓜丸木瓜約及四兩者四枚先炸熟去皮核搗與熟艾四兩相和蒸爛研勻以備合後藥木香白附子羌活沒藥白朮以上各半兩舶上好茴香炒川楝肉炒白牽牛炒熟以上各七錢半葳靈仙折之內有白點者即不用鬚子播淨稱一兩上為細末先以前木瓜艾和溲俟少干徐入少熟蜜和丸如桐子大每服二十丸食飲空時以木瓜湯或酒吞下地道稍祕滯即空心服有小壅亦可空心服食前丸調補尋常服之不令腳氣發動疏散榮衛氣血風氣通行木香白茯苓去皮羚羊角屑各八兩熟地黃十二兩桂去皮旋覆花各四兩楮實十二兩薏苡仁八兩檳榔八兩大黃一兩上為細末煉蜜為丸如梧桐子大每服三十丸空心酒下食後丸治尋常腳氣欲發先大便祕澀腹中氣滿兩脅妨悶不思飲食小便赤黃肉多蠕動痰涎不利煩熱緩弱前胡黃芩防風犀角屑蔓荊子梔子仁人參車前子麥門冬去心各一兩上為細末煉蜜為丸如梧桐子大每服二十丸食後溫漿水下麻仁丸解祕不通脹滿氣悶兩腳痛重風氣不順麻仁一升白芍藥八兩枳實麩炒去瓤八兩大黃一斤厚朴五兩杏仁去皮光雙仁一斤上為細末煉蜜為丸如梧桐子大每服三十丸溫水下以通為度三脘散治三焦氣逆解大便祕滯下胸膈脹憊氣陰風氣或已服諸藥大便不通者依法煎服就腹中藥便通大效若體虛人腳氣心腹脹悶大便不通者宜服此方大腹皮酒浸一遍更以大豆汁洗三遍焙乾用一兩白朮木香甘草微炙檳榔陳橘皮湯浸去瓤川芎各三分獨活紫蘇並梗沉香木瓜乾者各一兩上為散每服稱一分水二盞同煎至一盞去滓溫服溫服取大便為效三仁丸治風虛老人津液少大便祕滯柏子仁一兩松子仁二兩麻子仁三兩上研成膏以蠟為劑每服稱半兩嚼吃米飲下或為丸如梧桐子大隨虛實服之潤腸丸治一切風祕偏益虛人及老人津液內枯不得傳送者凌霄花干天台烏藥人參皂莢子炒熟去粗皮各半兩上為細末煉蜜為丸如梧桐子大每服三十丸或五十丸不以時溫水下至百丸亦不妨不損氣以通為度木通散治腳氣服補藥太多小便不通淋閉臍下脹當歸梔子仁芍藥甘草炙一本作生用赤茯苓去皮木通各二兩上為散每服三錢水一大盞煎至七分去滓服之牛膝丸治風毒流注腰腿兩腳疼重攣痛及腎虛目見黑花方牛膝酒浸川芎續斷萆薢丹參去蘆黑狗脊去毛杜仲銼炒去絲獨活白朮枳殼當歸白芍藥防風乾木瓜熟乾地黃各二兩上為末煉蜜為丸如梧桐子大每服二十丸空心木瓜湯下稍加至三十丸酒下亦可天門冬大煎天門冬切三斗半杵壓取汁盡酥三升煉螣骨一具白蜜三升煉枸杞根切三斗銼研以水二石五斗取一斗三升澄清生地黃切一斗上五味並大斗銅器中微火先煎地黃門冬汁減半乃合煎取大斗二斗下後散藥煎取一斗內銅器重釜煎令穩當可丸平旦空腹酒服如梧桐子大二十丸日二加至五十丸慎生冷酸醋豬雞魚蒜油麵等物擇四時王相日合之散藥如後白茯苓去皮柏子仁另研桂去皮白朮萎蕤菖蒲遠志澤瀉薯蕷人參石斛去根牛膝酒浸杜仲炒銼細辛獨活枳實麩炒去瓤川芎黃耆蓯蓉續斷狗脊去毛萆薢白芷巴戟去心五加皮覆盆橘皮湯浸去瓤胡麻大豆黃卷炒白茯苓神去皮石南炙各二兩阿膠十兩炒大棗一百枚煮作膏鹿角膠五兩炙蔓荊子二兩甘草炙六兩蜀椒炒一兩薏苡仁一兩上三十八味為細末內煎中牛髓鹿髓各加三升大佳小便澀去柏子仁加秦艽二兩乾地黃六兩陰痿失精去萎蕤二兩加入五味子二兩頭風去柏子仁加菊花防風各二兩小便利陰氣弱去細辛防風加山茱萸二兩腹中冷去防風加乾薑二兩無他疾依方合之凡此煎九月下旬採藥立冬日合而服之至五月上旬止若十二月臘日合者經夏至七月下旬止若停服經夏不壞當於舍北陰入地深六尺填砂置藥中上加砂覆之則經夏不損也女人先患熱者得服患冷者不得服五柔丸治津液虛閉大便不通結燥後重飲食不生肌肉補虛損調補三焦大黃四兩前胡一兩半夏洗七遍片切焙乾蓯蓉酒浸芍藥細辛白茯苓去皮半兩當歸苦葶藶炒各半兩上為細末煉蜜為丸如梧桐子大溫水下二十丸以通為度漸加之橘皮丸治腳氣有風人氣不順致生熱而大便祕此藥通祕不損人進飲食散脹滿調中下氣偏宜腳氣神方橘皮去瓤四兩末干生薑取末二兩上二味以蜜半斤煉化去上沫下藥末在內熬成膏可丸即丸如梧桐子大每服三十丸生薑湯下每日服之即不生壅滯延年茯苓飲治腳氣腫氣急上氣心悶熱煩嘔逆不食白茯苓去皮紫蘇葉杏仁去皮尖雙仁麩炒橘皮去白升麻柴胡去苗各三兩生薑四兩檳榔十二枚並皮犀角屑二兩上為粗散以水二升五合去滓溫服分三服如人行十里再浸一服忌醋物天麻丸治氣毒濕腳氣攻注兩腿腫破重疼皮肉頑紫或上攻頭面皮肉發熱天麻地龍羌活附子去皮臍生用桂去皮沒藥研荊芥穗各一兩麝香一兩別研上為細末研勻以生蜜為丸如櫻桃大瓷器盛每服荊芥蠟茶嚼下一丸如足破至甚者不過二十日上攻者則食後服下疰者食前服獨活湯治腳氣膝腿疼痛乍腫乍瘦緩弱不能行喘滿氣上獨活丹參細辛五加皮牛膝酒浸川芎藭白殭蠶湯洗焙乾麵炒各半兩桑白皮一兩半銼炙麻黃去節一兩甘草炙三分杏仁去皮尖麵炒三分上為散每服三錢水一盞半煎至七分去滓溫服茴香丸治風毒濕氣攻疰成瘡皮肉紫破膿壞行步無力皮肉焮熱舶上茴香炒地龍去土炒赤小豆炒川苦楝去皮炒川烏頭炮去皮尖烏藥銼牽牛炒取末以上各一兩上研杵勻細酒煮麵糊為丸如梧桐子大每服空心鹽湯下十五丸日二木香散治偏風癱緩腳氣等疾羌活一兩麻黃去節水煎少時去沫焙一兩防風三兩木香檳榔附子炮去皮白朮川烏頭炮去皮草豆蔻和皮用陳橘皮去白牛膝酒浸一宿杏仁去皮尖當歸酒浸一宿人參茯苓甘草炙川芎官桂去皮不見火以上各半兩上藥一十八味銼如麻豆每服一兩水一碗薑七片煎至一盞去滓得七分溫服藥滓二服並作一服用水一碗半煎至一盞服此藥福唐陳氏者鬻以自給郡人極神之人未有得其方者一日為其親戚攘得與豫豫作官處即合以施人如法煮服以衣蓋覆取汗不過三五服輒瘥所至人來求藥者無窮其驗如此大腸不通加大黃末每服一錢以老少加減如久不通加至三五錢不害心腹脹加葶藶並滑石末每服各一錢如上膈壅滯亦宜服之大黃湯治腳氣大便祕澀服諸藥不通風毒攻心氣悶心欲狂熱悶口乾喉中如火生祕澀不通紅雪研大黃銼各一兩木香銼黑豆各二兩上以水一升煎取八合將藥汁浸大黃一炊久去滓不限平晚溫分三服以通為度烏蛇丸治風濕腳氣攻注腳膝疼痛或即癢痹生瘡中黃水不止服之大效諸藥不及烏蛇肉四兩酒浸焙乾虎前脛醋浸淨刮洗了塗酥炙二兩黃松節酒浸炙乾天麻酒浸一宿牛膝酒浸一宿石斛另取末萆薢杜仲銼炒各一兩菟絲子酒浸巴戟去心獨活防風桂去皮肉蓯蓉酒浸金毛狗脊去毛續斷蓽澄茄去蒂子當歸附子炮去皮臍各一兩木香半兩乳香另研半兩上為細末研勻用大木瓜去膈子蒸令爛研如糊以法酒化開銀石器中熬過和劑前藥為丸如梧桐子大溫酒空心下三十丸日二一月和愈淋煠沙節湯治風毒腳氣下注兩腳疼重沙木節木通羌活川椒以上各半兩川烏頭一分蔥白一握橘葉半兩如無以橘皮代之上各為散上以水三升煎至減半通手淋洗再暖可兩日淋煠之腳氣煠法療風毒壅滯作疼痛及榮衛氣結澀諸風毒檀香零陵香藿香木香白膠香捶碎川升麻麻黃去節蛇床子荊芥藁本白芍藥威靈仙地椒地榆當歸官桂枳殼蒴藋上皆等分取細銼相拌勻每取一兩水二斗赤皮蔥五莖白礬半兩川椒小半合同煮十來沸乘熱噓痛處通手則淋煠熱透則干挹就寢如不受煠則取千金蒼梧道士陳元膏摩之其方所説甚詳也更不煩喋楊皮湯淋煠腳氣攣疼緩弱消腫毒白楊皮莽草羌活獨活杜仲銼去皮防風蒺藜夏枯草荊芥穗地椒葳靈仙白礬各一兩上為粗末每用半兩水五升煎至四升乘熱淋煠兩足淋煠腳氣兩足寒熱腫痛脹滿攣緩龍腦不以多少研上每用半兩以水一斗煎主煠滯濕足膝道人深師增損腎瀝湯治風虛勞損挾毒腳氣痛弱或痹不隨下焦虛熱胸不利又時腹下痛相東王至江州王在嶺南病悉如此極困篤余作此湯令服即得力病似此者服無不瘥隨宜增損之黃耆甘草炙白芍藥麥門冬去心人參肉蓯蓉酒浸熟地黃赤石脂地骨皮白茯神去皮當歸遠志磁石枳實麩炒防風去蘆頭龍骨煅一兩桂去皮川芎各二兩半夏五兩湯洗七次片切令乾五味子三兩生薑四兩切大棗二十枚去核上㕮咀以水二斗煮羊腎一對去筋膜取汁一斗二升內諸藥煮取四升分為五服日三夜二不利下者除龍骨赤石脂小便赤澀以赤茯苓代茯神加白朮三兩多熱加黃芩一兩遺溺加桑螵蛸二十枚五枝湯淋煠風濕一切筋骨疼痛桑枝槐枝椿枝柳枝桃枝各一斤上各銼細更以萆麻葉一把水三升煎取二升去滓淋洗足膝蜀椒湯治腳氣腫攣消赤腫用蜀椒四升以水四斗煮取二斗半甕盛下著火暖之懸板為橋去湯上二寸許以腳踏板柱腳坐以綿絮密塞勿令泄氣若天冷即出入被以粉摩之一食久更入甕下火不絶勿使湯冷如此消息不過七日得伸展多矣治腳氣初發從足起至膝骨腫疼者取萆麻子葉切搗蒸薄裹之日二三易即腫消若冬月無萆麻子葉取蒴藿根搗碎和酒糟三分根一分合蒸熟及熱對裹腫上如前法日二腫即消亦治頑痹治毒風流於腳膝行立不得方海桐皮五加皮獨活防風枳殼杜仲銼炒各一兩牛膝酒浸薏苡仁各二兩乾生地黃半大升藁本五兩上㕮咀以綿裹以無灰酒二斗春浸七日秋二七日每日空心溫服一盞常令酒氣相接勿令大醉重者不過兩劑即瘥忌生冷蒜等如盛熱特恐壞即宜浸半料江南多有此疾號為腳軟博陵崔公信官吳興得此疾凡半歲百藥無效朱仲雍為處此方服之立效公信云其疾退狀如蛇數條奔走自足而出矣後傳之無不效趁痛丸治腳氣毒攻兩腳痛不可忍甘遂白芥子微炒大戟白麵上為細末滴水和作餅子炙黃色為細末醋煮麵糊為丸如緑豆大每服十丸冷酒下利則止後服傳信方療毒風腰腳無力腫疼腹脹心煩咽喉頭面浮腫嘔逆一候同當日服之旋覆花頭子白茯苓橘皮桑白皮銼炒黃色各三兩犀角屑一兩紫蘇莖二兩豉三合生薑四兩切棗十三核去核上除薑棗外細銼都以水八升煎至三升攪去滓分三服每服如人行十里地黃粥以補虛方取肥好地黃四兩取汁去滓作粥候粥半熟即下之以綿裹椒一百粒生薑一片投粥下候熟出之下羊腎一具取脂膜細切如韭葉大同煮熟加少鹽食之防風粥以去四肢風取防風二分去蘆頭煮取汁去滓如食法作粥食之桑枝煎本草云桑枝不冷不熱可以常服能療遍體風癢乾燥腳氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服輕身利耳目令人光澤兼療口乾仙經云一切仙藥不得桑枝煎不服出抱朴子孫真人方取桑枝如箭直者細銼三斗熬令微黃以水六斗煎取三斗去滓以重湯煎取二升下白蜜三合黃明膠一兩炙作蜜煎成入以不津器封貯之每一服一匙湯化服之
